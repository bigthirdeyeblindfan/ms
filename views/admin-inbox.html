<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Inbox</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #0078d4;
      --primary-dark: #106ebe;
      --sidebar-bg: #f3f2f1;
      --sidebar-hover: #edebe9;
      --border-color: #e1dfdd;
      --text-primary: #323130;
      --text-secondary: #605e5c;
      --text-muted: #8a8886;
      --selected-bg: #e6f2fb;
      --danger: #d13438;
      --success: #107c10;
    }
    body { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; background: #fff; color: var(--text-primary); height: 100vh; overflow: hidden; }
    .header { height: 48px; background: var(--primary); color: white; display: flex; align-items: center; padding: 0 16px; gap: 16px; }
    .header h1 { font-size: 16px; font-weight: 600; }
    .account-selector { display: flex; align-items: center; gap: 8px; margin-left: auto; }
    .account-selector select { padding: 6px 12px; border-radius: 4px; border: none; font-size: 14px; min-width: 200px; }
    .refresh-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 14px; }
    .refresh-btn:hover { background: rgba(255,255,255,0.3); }
    .main-container { display: flex; height: calc(100vh - 48px); }
    .sidebar { width: 200px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); overflow-y: auto; flex-shrink: 0; }
    .compose-btn { display: flex; align-items: center; gap: 8px; margin: 12px; padding: 10px 16px; background: var(--primary); color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 600; width: calc(100% - 24px); }
    .compose-btn:hover { background: var(--primary-dark); }
    .folder-list { list-style: none; }
    .folder-item { display: flex; align-items: center; padding: 10px 16px; cursor: pointer; font-size: 14px; gap: 10px; }
    .folder-item:hover { background: var(--sidebar-hover); }
    .folder-item.active { background: var(--selected-bg); font-weight: 600; }
    .folder-item .icon { width: 20px; text-align: center; color: var(--text-secondary); }
    .folder-item .count { margin-left: auto; font-size: 12px; color: var(--text-muted); }
    .folder-item .unread-count { background: var(--primary); color: white; padding: 2px 6px; border-radius: 10px; font-size: 11px; font-weight: 600; }
    .message-list-container { width: 360px; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; flex-shrink: 0; }
    .search-bar { padding: 12px; border-bottom: 1px solid var(--border-color); }
    .search-bar input { width: 100%; padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 14px; }
    .search-bar input:focus { outline: none; border-color: var(--primary); }
    .message-list-toolbar { display: flex; align-items: center; padding: 8px 12px; border-bottom: 1px solid var(--border-color); gap: 8px; background: var(--sidebar-bg); }
    .toolbar-btn { background: none; border: 1px solid var(--border-color); padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; color: var(--text-secondary); }
    .toolbar-btn:hover { background: var(--sidebar-hover); }
    .message-list { flex: 1; overflow-y: auto; list-style: none; }
    .message-item { display: flex; flex-direction: column; padding: 12px 16px; border-bottom: 1px solid var(--border-color); cursor: pointer; background: #faf9f8; }
    .message-item.unread { background: #fff; }
    .message-item:hover { background: var(--sidebar-hover); }
    .message-item.selected { background: var(--selected-bg); }
    .message-item .sender { font-weight: 600; font-size: 14px; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
    .message-item.unread .sender { color: var(--primary); }
    .message-item .subject { font-size: 13px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .message-item .preview { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .message-item .meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; font-size: 11px; color: var(--text-muted); }
    .load-more { padding: 16px; text-align: center; }
    .load-more button { background: none; border: 1px solid var(--border-color); padding: 8px 24px; border-radius: 4px; cursor: pointer; color: var(--primary); }
    .message-detail { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .message-detail-header { padding: 20px 24px; border-bottom: 1px solid var(--border-color); }
    .message-detail-toolbar { display: flex; gap: 8px; margin-bottom: 16px; }
    .detail-btn { display: flex; align-items: center; gap: 4px; background: none; border: 1px solid var(--border-color); padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; color: var(--text-secondary); }
    .detail-btn:hover { background: var(--sidebar-hover); }
    .detail-btn.danger:hover { background: #fde7e9; border-color: var(--danger); color: var(--danger); }
    .message-subject { font-size: 20px; font-weight: 600; margin-bottom: 16px; }
    .message-meta { display: flex; gap: 16px; align-items: flex-start; }
    .sender-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 16px; flex-shrink: 0; }
    .sender-info { flex: 1; }
    .sender-name { font-weight: 600; font-size: 14px; }
    .sender-email { font-size: 12px; color: var(--text-muted); }
    .recipient-info { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .message-date { font-size: 12px; color: var(--text-muted); }
    .message-body { flex: 1; overflow-y: auto; padding: 24px; }
    .message-body iframe { width: 100%; height: 100%; border: none; }
    .attachments-section { padding: 16px 24px; border-top: 1px solid var(--border-color); background: var(--sidebar-bg); }
    .attachments-title { font-size: 13px; font-weight: 600; margin-bottom: 8px; }
    .attachment-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .attachment-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: white; border: 1px solid var(--border-color); border-radius: 4px; cursor: pointer; font-size: 13px; text-decoration: none; color: inherit; }
    .attachment-item:hover { background: var(--sidebar-hover); }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); }
    .empty-state .icon { font-size: 64px; margin-bottom: 16px; }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal-overlay.active { display: flex; }
    .compose-modal { background: white; width: 600px; max-width: 90vw; max-height: 80vh; border-radius: 8px; display: flex; flex-direction: column; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
    .compose-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border-color); }
    .compose-header h3 { font-size: 16px; font-weight: 600; }
    .close-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-secondary); }
    .compose-body { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    .compose-field { display: flex; align-items: center; gap: 8px; }
    .compose-field label { width: 60px; font-size: 13px; color: var(--text-secondary); }
    .compose-field input { flex: 1; padding: 8px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 14px; }
    .compose-field input:focus { outline: none; border-color: var(--primary); }
    .compose-editor { flex: 1; min-height: 200px; border: 1px solid var(--border-color); border-radius: 4px; padding: 12px; font-size: 14px; resize: none; }
    .compose-editor:focus { outline: none; border-color: var(--primary); }
    .compose-footer { display: flex; justify-content: space-between; padding: 16px 20px; border-top: 1px solid var(--border-color); }
    .send-btn { background: var(--primary); color: white; border: none; padding: 10px 24px; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 600; }
    .send-btn:hover { background: var(--primary-dark); }
    .send-btn:disabled { background: var(--text-muted); cursor: not-allowed; }
    .discard-btn { background: none; border: 1px solid var(--border-color); padding: 10px 16px; border-radius: 4px; cursor: pointer; font-size: 14px; color: var(--text-secondary); }
    .loading { display: flex; align-items: center; justify-content: center; height: 100%; }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border-color); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 2000; }
    .toast { background: var(--text-primary); color: white; padding: 12px 20px; border-radius: 4px; margin-top: 8px; animation: slideIn 0.3s ease; }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .select-all-container { display: flex; align-items: center; gap: 8px; }
  </style>
</head>
<body>
  <header class="header">
    <h1>Admin Inbox</h1>
    <div class="account-selector">
      <select id="accountSelect"><option value="">Select an account...</option></select>
      <button class="refresh-btn" onclick="refreshAccounts()">Refresh</button>
    </div>
  </header>
  <div class="main-container">
    <aside class="sidebar" id="sidebar">
      <button class="compose-btn" onclick="openCompose()"><span>+</span> New Message</button>
      <ul class="folder-list" id="folderList"></ul>
    </aside>
    <div class="message-list-container" id="messageListContainer">
      <div class="search-bar"><input type="text" id="searchInput" placeholder="Search messages..." onkeypress="handleSearch(event)"></div>
      <div class="message-list-toolbar">
        <div class="select-all-container"><input type="checkbox" id="selectAll" onchange="toggleSelectAll()"><label for="selectAll" style="font-size:12px;">Select all</label></div>
        <button class="toolbar-btn" onclick="markSelectedRead(true)">Mark read</button>
        <button class="toolbar-btn" onclick="markSelectedRead(false)">Mark unread</button>
        <button class="toolbar-btn" onclick="deleteSelected()">Delete</button>
      </div>
      <ul class="message-list" id="messageList"></ul>
      <div class="load-more" id="loadMore" style="display:none;"><button onclick="loadMoreMessages()">Load more</button></div>
    </div>
    <div class="message-detail" id="messageDetail"><div class="empty-state"><div class="icon">&#128236;</div><p>Select a message to read</p></div></div>
  </div>
  <div class="modal-overlay" id="composeModal">
    <div class="compose-modal">
      <div class="compose-header"><h3 id="composeTitle">New Message</h3><button class="close-btn" onclick="closeCompose()">&times;</button></div>
      <div class="compose-body">
        <div class="compose-field"><label>To:</label><input type="text" id="composeTo" placeholder="recipient@example.com"></div>
        <div class="compose-field"><label>Cc:</label><input type="text" id="composeCc" placeholder="cc@example.com"></div>
        <div class="compose-field"><label>Subject:</label><input type="text" id="composeSubject" placeholder="Subject"></div>
        <textarea class="compose-editor" id="composeBody" placeholder="Write your message..."></textarea>
      </div>
      <div class="compose-footer"><button class="discard-btn" onclick="closeCompose()">Discard</button><button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button></div>
    </div>
  </div>
  <div class="toast-container" id="toastContainer"></div>
  <script>
    let currentUserId = null, currentFolder = 'inbox', currentMessages = [], currentMessage = null, selectedMessages = new Set(), skip = 0;
    const pageSize = 25;
    let folders = [], composeMode = 'new', replyToMessageId = null;
    const folderIcons = { 'inbox': '&#128229;', 'drafts': '&#128221;', 'sentitems': '&#128228;', 'deleteditems': '&#128465;', 'junkemail': '&#128683;', 'archive': '&#128451;', 'default': '&#128193;' };

    document.addEventListener('DOMContentLoaded', () => loadAccounts());

    async function loadAccounts() {
      try {
        const response = await fetch('/tokens');
        const data = await response.json();
        const select = document.getElementById('accountSelect');
        select.innerHTML = '<option value="">Select an account...</option>';
        if (data.tokens && data.tokens.length > 0) {
          data.tokens.forEach(token => {
            const option = document.createElement('option');
            option.value = token.userId;
            option.textContent = token.userEmail || token.userId;
            if (!token.isValid) { option.textContent += ' (expired)'; option.disabled = true; }
            select.appendChild(option);
          });
        }
        select.addEventListener('change', (e) => { if (e.target.value) selectAccount(e.target.value); });
      } catch (error) { showToast('Failed to load accounts', 'error'); }
    }

    function refreshAccounts() { loadAccounts(); showToast('Accounts refreshed'); }

    async function selectAccount(userId) {
      currentUserId = userId; currentFolder = 'inbox'; currentMessages = []; currentMessage = null; selectedMessages.clear(); skip = 0;
      await Promise.all([loadFolders(), loadMessages()]);
    }

    async function loadFolders() {
      if (!currentUserId) return;
      const folderList = document.getElementById('folderList');
      folderList.innerHTML = '<li class="loading"><div class="spinner"></div></li>';
      try {
        const response = await fetch(`/inbox/${currentUserId}/folders`);
        folders = await response.json();
        const wellKnown = ['inbox', 'drafts', 'sentitems', 'deleteditems', 'junkemail', 'archive'];
        folders.sort((a, b) => {
          const aIdx = wellKnown.indexOf(a.displayName.toLowerCase().replace(' ', ''));
          const bIdx = wellKnown.indexOf(b.displayName.toLowerCase().replace(' ', ''));
          if (aIdx !== -1 && bIdx !== -1) return aIdx - bIdx;
          if (aIdx !== -1) return -1;
          if (bIdx !== -1) return 1;
          return a.displayName.localeCompare(b.displayName);
        });
        renderFolders();
      } catch (error) { folderList.innerHTML = '<li class="empty-state">Failed to load folders</li>'; showToast('Failed to load folders', 'error'); }
    }

    function renderFolders() {
      const folderList = document.getElementById('folderList');
      folderList.innerHTML = folders.map(folder => {
        const folderKey = folder.displayName.toLowerCase().replace(' ', '');
        const icon = folderIcons[folderKey] || folderIcons.default;
        const isActive = folder.id === currentFolder || folderKey === currentFolder;
        const unreadBadge = folder.unreadItemCount > 0 ? `<span class="unread-count">${folder.unreadItemCount}</span>` : '';
        const countBadge = folder.totalItemCount > 0 && folder.unreadItemCount === 0 ? `<span class="count">${folder.totalItemCount}</span>` : '';
        return `<li class="folder-item ${isActive ? 'active' : ''}" onclick="selectFolder('${folder.id}')"><span class="icon">${icon}</span><span>${folder.displayName}</span>${unreadBadge}${countBadge}</li>`;
      }).join('');
    }

    async function selectFolder(folderId) {
      currentFolder = folderId; currentMessages = []; currentMessage = null; selectedMessages.clear(); skip = 0;
      document.querySelectorAll('.folder-item').forEach(item => item.classList.remove('active'));
      event.target.closest('.folder-item').classList.add('active');
      await loadMessages();
    }

    async function loadMessages(append = false) {
      if (!currentUserId) return;
      const messageList = document.getElementById('messageList');
      if (!append) messageList.innerHTML = '<li class="loading"><div class="spinner"></div></li>';
      try {
        const response = await fetch(`/inbox/${currentUserId}/folders/${currentFolder}/messages?top=${pageSize}&skip=${skip}`);
        const data = await response.json();
        currentMessages = append ? [...currentMessages, ...data.messages] : data.messages;
        renderMessages();
        document.getElementById('loadMore').style.display = data.messages.length === pageSize ? 'block' : 'none';
      } catch (error) { messageList.innerHTML = '<li class="empty-state">Failed to load messages</li>'; showToast('Failed to load messages', 'error'); }
    }

    function loadMoreMessages() { skip += pageSize; loadMessages(true); }

    function renderMessages() {
      const messageList = document.getElementById('messageList');
      if (currentMessages.length === 0) { messageList.innerHTML = '<li class="empty-state">No messages</li>'; return; }
      messageList.innerHTML = currentMessages.map(msg => {
        const sender = msg.from?.emailAddress?.name || msg.from?.emailAddress?.address || 'Unknown';
        const date = formatDate(msg.receivedDateTime);
        const isSelected = currentMessage?.id === msg.id;
        const isChecked = selectedMessages.has(msg.id);
        return `<li class="message-item ${msg.isRead ? '' : 'unread'} ${isSelected ? 'selected' : ''}" onclick="selectMessage('${msg.id}', event)">
          <input type="checkbox" class="message-checkbox" ${isChecked ? 'checked' : ''} onclick="toggleMessageSelection('${msg.id}', event)">
          <div class="sender">${msg.hasAttachments ? '<span>&#128206;</span>' : ''}${sender}</div>
          <div class="subject">${msg.subject || '(No subject)'}</div>
          <div class="preview">${msg.bodyPreview || ''}</div>
          <div class="meta"><span>${date}</span>${msg.importance === 'high' ? '<span style="color:var(--danger);">!</span>' : ''}</div></li>`;
      }).join('');
    }

    async function selectMessage(messageId, event) {
      if (event.target.type === 'checkbox') return;
      const messageDetail = document.getElementById('messageDetail');
      messageDetail.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
      try {
        const response = await fetch(`/inbox/${currentUserId}/messages/${messageId}`);
        currentMessage = await response.json();
        if (!currentMessage.isRead) {
          await fetch(`/inbox/${currentUserId}/messages/${messageId}/read`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ isRead: true }) });
          const msgIdx = currentMessages.findIndex(m => m.id === messageId);
          if (msgIdx !== -1) currentMessages[msgIdx].isRead = true;
          renderMessages(); loadFolders();
        }
        let attachments = [];
        if (currentMessage.hasAttachments) {
          const attResponse = await fetch(`/inbox/${currentUserId}/messages/${messageId}/attachments`);
          attachments = await attResponse.json();
        }
        renderMessageDetail(currentMessage, attachments);
      } catch (error) { messageDetail.innerHTML = '<div class="empty-state">Failed to load message</div>'; showToast('Failed to load message', 'error'); }
    }

    function renderMessageDetail(message, attachments = []) {
      const sender = message.from?.emailAddress;
      const senderInitial = (sender?.name || sender?.address || 'U')[0].toUpperCase();
      const toRecipients = message.toRecipients?.map(r => r.emailAddress.address).join(', ') || '';
      const ccRecipients = message.ccRecipients?.map(r => r.emailAddress.address).join(', ') || '';
      let attachmentsHtml = '';
      if (attachments.length > 0) {
        attachmentsHtml = `<div class="attachments-section"><div class="attachments-title">Attachments (${attachments.length})</div><div class="attachment-list">${attachments.map(att => `<a class="attachment-item" href="/inbox/${currentUserId}/messages/${message.id}/attachments/${att.id}/download" target="_blank"><span>&#128206;</span><span>${att.name}</span><span style="color:var(--text-muted);">(${formatFileSize(att.size)})</span></a>`).join('')}</div></div>`;
      }
      const messageDetail = document.getElementById('messageDetail');
      messageDetail.innerHTML = `<div class="message-detail-header">
        <div class="message-detail-toolbar">
          <button class="detail-btn" onclick="replyMessage()"><span>&#8617;</span> Reply</button>
          <button class="detail-btn" onclick="replyAllMessage()"><span>&#8617;&#8617;</span> Reply All</button>
          <button class="detail-btn" onclick="forwardMessage()"><span>&#8618;</span> Forward</button>
          <button class="detail-btn" onclick="toggleReadStatus()">${message.isRead ? 'Mark unread' : 'Mark read'}</button>
          <button class="detail-btn danger" onclick="deleteCurrentMessage()"><span>&#128465;</span> Delete</button>
        </div>
        <h2 class="message-subject">${message.subject || '(No subject)'}</h2>
        <div class="message-meta">
          <div class="sender-avatar">${senderInitial}</div>
          <div class="sender-info"><div class="sender-name">${sender?.name || sender?.address || 'Unknown'}</div><div class="sender-email">${sender?.address || ''}</div><div class="recipient-info">To: ${toRecipients}${ccRecipients ? `<br>Cc: ${ccRecipients}` : ''}</div></div>
          <div class="message-date">${formatDateTime(message.receivedDateTime)}</div>
        </div></div>
        <div class="message-body"><iframe id="messageBodyFrame" sandbox="allow-same-origin"></iframe></div>${attachmentsHtml}`;
      const iframe = document.getElementById('messageBodyFrame');
      const bodyContent = message.body?.content || '';
      const bodyType = message.body?.contentType || 'text';
      iframe.onload = () => {
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        doc.open();
        if (bodyType.toLowerCase() === 'html') {
          doc.write(`<!DOCTYPE html><html><head><style>body{font-family:'Segoe UI',sans-serif;font-size:14px;line-height:1.5;color:#323130;margin:0;padding:0;}img{max-width:100%;height:auto;}a{color:#0078d4;}</style></head><body>${bodyContent}</body></html>`);
        } else {
          doc.write(`<pre style="font-family:'Segoe UI',sans-serif;white-space:pre-wrap;margin:0;">${bodyContent}</pre>`);
        }
        doc.close();
      };
      iframe.src = 'about:blank';
    }

    function toggleMessageSelection(messageId, event) {
      event.stopPropagation();
      if (selectedMessages.has(messageId)) selectedMessages.delete(messageId); else selectedMessages.add(messageId);
      renderMessages(); updateSelectAllState();
    }

    function toggleSelectAll() {
      const selectAll = document.getElementById('selectAll');
      if (selectAll.checked) currentMessages.forEach(m => selectedMessages.add(m.id)); else selectedMessages.clear();
      renderMessages();
    }

    function updateSelectAllState() {
      const selectAll = document.getElementById('selectAll');
      selectAll.checked = currentMessages.length > 0 && selectedMessages.size === currentMessages.length;
      selectAll.indeterminate = selectedMessages.size > 0 && selectedMessages.size < currentMessages.length;
    }

    async function markSelectedRead(isRead) {
      if (selectedMessages.size === 0) { showToast('No messages selected', 'error'); return; }
      try {
        await fetch(`/inbox/${currentUserId}/messages/bulk/read`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ messageIds: Array.from(selectedMessages), isRead }) });
        showToast(`Marked ${selectedMessages.size} messages as ${isRead ? 'read' : 'unread'}`);
        selectedMessages.clear(); await loadMessages(); loadFolders();
      } catch (error) { showToast('Failed to update messages', 'error'); }
    }

    async function deleteSelected() {
      if (selectedMessages.size === 0) { showToast('No messages selected', 'error'); return; }
      if (!confirm(`Delete ${selectedMessages.size} selected messages?`)) return;
      try {
        await fetch(`/inbox/${currentUserId}/messages/bulk`, { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ messageIds: Array.from(selectedMessages) }) });
        showToast(`Deleted ${selectedMessages.size} messages`);
        selectedMessages.clear(); await loadMessages(); loadFolders();
      } catch (error) { showToast('Failed to delete messages', 'error'); }
    }

    async function toggleReadStatus() {
      if (!currentMessage) return;
      const newStatus = !currentMessage.isRead;
      try {
        await fetch(`/inbox/${currentUserId}/messages/${currentMessage.id}/read`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ isRead: newStatus }) });
        currentMessage.isRead = newStatus; await loadMessages(); loadFolders(); selectMessage(currentMessage.id, { target: {} });
      } catch (error) { showToast('Failed to update message', 'error'); }
    }

    async function deleteCurrentMessage() {
      if (!currentMessage) return;
      if (!confirm('Delete this message?')) return;
      try {
        await fetch(`/inbox/${currentUserId}/messages/${currentMessage.id}`, { method: 'DELETE' });
        showToast('Message deleted'); currentMessage = null;
        document.getElementById('messageDetail').innerHTML = '<div class="empty-state"><div class="icon">&#128236;</div><p>Select a message to read</p></div>';
        await loadMessages(); loadFolders();
      } catch (error) { showToast('Failed to delete message', 'error'); }
    }

    async function handleSearch(event) {
      if (event.key !== 'Enter') return;
      const query = document.getElementById('searchInput').value.trim();
      if (!query) { skip = 0; await loadMessages(); return; }
      const messageList = document.getElementById('messageList');
      messageList.innerHTML = '<li class="loading"><div class="spinner"></div></li>';
      try {
        const response = await fetch(`/inbox/${currentUserId}/search?q=${encodeURIComponent(query)}&top=${pageSize}`);
        const data = await response.json();
        currentMessages = data.messages; renderMessages();
        document.getElementById('loadMore').style.display = 'none';
      } catch (error) { messageList.innerHTML = '<li class="empty-state">Search failed</li>'; showToast('Search failed', 'error'); }
    }

    function openCompose() {
      if (!currentUserId) { showToast('Select an account first', 'error'); return; }
      composeMode = 'new'; replyToMessageId = null;
      document.getElementById('composeTitle').textContent = 'New Message';
      document.getElementById('composeTo').value = '';
      document.getElementById('composeCc').value = '';
      document.getElementById('composeSubject').value = '';
      document.getElementById('composeBody').value = '';
      document.getElementById('composeModal').classList.add('active');
    }

    function closeCompose() { document.getElementById('composeModal').classList.remove('active'); }

    function replyMessage() {
      if (!currentMessage) return;
      composeMode = 'reply'; replyToMessageId = currentMessage.id;
      document.getElementById('composeTitle').textContent = 'Reply';
      document.getElementById('composeTo').value = currentMessage.from?.emailAddress?.address || '';
      document.getElementById('composeCc').value = '';
      document.getElementById('composeSubject').value = `Re: ${currentMessage.subject || ''}`;
      document.getElementById('composeBody').value = '';
      document.getElementById('composeModal').classList.add('active');
    }

    function replyAllMessage() {
      if (!currentMessage) return;
      composeMode = 'replyAll'; replyToMessageId = currentMessage.id;
      const toAddresses = [currentMessage.from?.emailAddress?.address];
      const ccAddresses = currentMessage.toRecipients?.map(r => r.emailAddress.address) || [];
      document.getElementById('composeTitle').textContent = 'Reply All';
      document.getElementById('composeTo').value = toAddresses.filter(Boolean).join(', ');
      document.getElementById('composeCc').value = ccAddresses.join(', ');
      document.getElementById('composeSubject').value = `Re: ${currentMessage.subject || ''}`;
      document.getElementById('composeBody').value = '';
      document.getElementById('composeModal').classList.add('active');
    }

    function forwardMessage() {
      if (!currentMessage) return;
      composeMode = 'forward'; replyToMessageId = currentMessage.id;
      document.getElementById('composeTitle').textContent = 'Forward';
      document.getElementById('composeTo').value = '';
      document.getElementById('composeCc').value = '';
      document.getElementById('composeSubject').value = `Fwd: ${currentMessage.subject || ''}`;
      document.getElementById('composeBody').value = '';
      document.getElementById('composeModal').classList.add('active');
    }

    async function sendMessage() {
      const to = document.getElementById('composeTo').value.trim();
      const cc = document.getElementById('composeCc').value.trim();
      const subject = document.getElementById('composeSubject').value.trim();
      const body = document.getElementById('composeBody').value.trim();
      if (!to) { showToast('Recipient is required', 'error'); return; }
      const sendBtn = document.getElementById('sendBtn');
      sendBtn.disabled = true; sendBtn.textContent = 'Sending...';
      try {
        if (composeMode === 'reply' || composeMode === 'replyAll') {
          await fetch(`/inbox/${currentUserId}/messages/${replyToMessageId}/reply`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ comment: body, replyAll: composeMode === 'replyAll' }) });
        } else if (composeMode === 'forward') {
          await fetch(`/inbox/${currentUserId}/messages/${replyToMessageId}/forward`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ to: to.split(',').map(e => e.trim()), comment: body }) });
        } else {
          await fetch(`/inbox/${currentUserId}/send`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ to: to.split(',').map(e => e.trim()), cc: cc ? cc.split(',').map(e => e.trim()) : undefined, subject, body: body, bodyType: 'Text' }) });
        }
        showToast('Message sent!', 'success'); closeCompose(); loadFolders();
      } catch (error) { showToast('Failed to send message', 'error'); }
      finally { sendBtn.disabled = false; sendBtn.textContent = 'Send'; }
    }

    function formatDate(dateString) {
      const date = new Date(dateString), now = new Date(), diff = now - date;
      if (diff < 86400000 && date.getDate() === now.getDate()) return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      if (diff < 604800000) return date.toLocaleDateString([], { weekday: 'short' });
      return date.toLocaleDateString([], { month: 'short', day: 'numeric' });
    }

    function formatDateTime(dateString) {
      return new Date(dateString).toLocaleString([], { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function formatFileSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(1) + ' MB';
    }

    function showToast(message, type = 'info') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`; toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
  </script>
</body>
</html>
